server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed asset bundles (Vite emits /assets/foo.[hash].js). Cache aggressively
    # — the filename changes on every rebuild so cache-busting is automatic.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA entry: any unknown path falls back to index.html so React Router
    # can resolve client-side routes on a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML shell — otherwise users keep a stale entrypoint
    # that loads old (404'd) asset hashes after a deploy.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    # gzip for text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;
}
